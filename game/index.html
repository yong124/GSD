<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>경성뎐 : 여급 실종사건</title>
  <link rel="stylesheet" href="css/main.css?v=17">
  <link rel="stylesheet" href="css/dialogue.css?v=11">
  <link rel="stylesheet" href="css/effects.css?v=9">
</head>
<body>

<!-- ── 게임 컨테이너 ── -->
<div id="game-container">

  <!-- 배경 이미지 -->
  <div id="bg-layer"></div>
  <!-- 어두운 오버레이 (분위기) -->
  <div id="vignette"></div>
  <!-- 공포 이펙트 오버레이 -->
  <div id="effect-overlay"></div>
  <div id="investigation-hud" aria-hidden="true">
    <div class="hud-row">
      <span id="hud-scene-title"></span>
      <span id="hud-chapter"></span>
    </div>
    <div class="hud-row">
      <span id="hud-evidence-count"></span>
      <span id="hud-state-readout"></span>
    </div>
    <div id="hud-focus-row" class="hud-row hidden">
      <span id="hud-focus-kicker"></span>
      <span id="hud-focus-text"></span>
    </div>
  </div>
  <div id="standing-stage" aria-hidden="true">
    <div class="standing-slot" data-slot="Left">
      <div class="standing-figure">
        <img class="standing-img" alt="">
      </div>
    </div>
    <div class="standing-slot" data-slot="Center">
      <div class="standing-figure">
        <img class="standing-img" alt="">
      </div>
    </div>
    <div class="standing-slot" data-slot="Right">
      <div class="standing-figure">
        <img class="standing-img" alt="">
      </div>
    </div>
  </div>

  <div id="title-screen">
    <div id="title-backdrop"></div>
    <div id="title-overlay"></div>
    <div id="title-grain"></div>
    <div id="title-body">
      <div id="title-left">
        <div id="title-left-line"></div>
        <div id="title-year-text">一九三二</div>
        <div id="title-deco-mark">◈</div>
        <div id="title-left-label">GYEONGSEONG</div>
      </div>
      <div id="title-content">
        <div id="title-kicker">1932 경성 미스터리</div>
        <h1 id="title-logo">경성뎐</h1>
        <div id="title-divider"></div>
        <div id="title-subtitle">여급 실종사건</div>
        <p id="title-copy">
          묻힌 판결에서 시작된 실종 사건이 경성의 어둠과 맞닿는다.<br>
          기록할 것인가, 파고들 것인가.
        </p>
        <div id="title-actions">
          <button id="new-game-btn" class="title-btn"><span class="btn-marker">▶</span>새 게임</button>
          <button id="continue-btn" class="title-btn"><span class="btn-marker">▷</span>이어하기</button>
        </div>
        <div id="title-hint">SPACE 또는 ENTER로 시작</div>
      </div>
    </div>
  </div>

  <!-- 챕터 타이틀 카드 -->
  <div id="chapter-card" class="hidden">
    <div id="chapter-number"></div>
    <div id="chapter-title"></div>
  </div>

  <!-- 씬 배너 -->
  <div id="scene-banner" class="hidden">
    <div id="scene-banner-kicker"></div>
    <div id="scene-banner-title"></div>
  </div>

  <div id="scene-goal" class="hidden">
    <div id="scene-goal-kicker"></div>
    <div id="scene-goal-text"></div>
  </div>

  <!-- ── 대화창 ── -->
  <div id="dialogue-box">
    <div id="portrait-wrap">
      <img id="portrait-img" src="" alt="">
    </div>
    <div id="dialogue-content">
      <div id="speaker-name"></div>
      <div id="dialogue-text"></div>
      <div id="click-hint">▼</div>
    </div>
  </div>

  <!-- ── 선택지 ── -->
  <div id="choice-box" class="hidden">
    <div id="choice-list"></div>
  </div>

  <!-- ── 조사 수첩 버튼 ── -->
  <button id="memo-btn" title="조사 수첩">
    <span class="memo-btn-icon">📋</span>
    <span id="memo-badge" class="hidden" aria-hidden="true"></span>
  </button>

  <!-- ── 조사 수첩 패널 ── -->
  <div id="memo-panel" class="hidden">
    <div id="memo-header">
      <div>
        <div>조사 수첩</div>
        <div id="memo-meta"></div>
      </div>
      <button id="memo-close">✕</button>
    </div>
    <div id="memo-tabs">
      <button class="memo-tab is-active" data-tab="status">상태</button>
      <button class="memo-tab" data-tab="characters">인물</button>
      <button class="memo-tab" data-tab="evidence">단서</button>
      <button class="memo-tab" data-tab="questions">질문</button>
    </div>
    <div id="memo-list"></div>
  </div>

  <!-- ── 단서 획득 알림 ── -->
  <div id="evidence-toast" class="hidden"></div>

  <!-- ── 상단 메뉴 ── -->
  <div id="top-menu">
    <button id="save-btn">저장</button>
    <button id="load-btn">불러오기</button>
  </div>

  <!-- ── 슬롯 선택 패널 ── -->
  <div id="slot-panel" class="hidden">
    <div id="slot-panel-title"></div>
    <div id="slot-panel-subtitle"></div>
    <div id="slot-list"></div>
    <button id="slot-cancel">취소</button>
  </div>
  <div id="slot-overlay" class="hidden"></div>

  <!-- ── 저장/불러오기 알림 ── -->
  <div id="system-toast" class="hidden"></div>

</div>

<!-- 구성 요소 -->
<script src="js/config.js?v=10"></script>

<!-- 데이터 (export_to_json.py 로 생성) -->
<script src="data/game_data.js"></script>

<!-- 엔진 코어 -->
<script src="js/core/engine.js?v=10"></script>
<script src="js/managers/effects.js?v=10"></script>
<script src="js/managers/audio.js?v=10"></script>
<script src="js/managers/ui.js?v=14"></script>
<script src="js/managers/input.js?v=10"></script>

<!-- 엔진 모듈 -->
<script src="js/engine/state.js?v=10"></script>
<script src="js/engine/save.js?v=11"></script>
  <script src="js/engine/evidence.js?v=19"></script>
<script src="js/engine/dialogue.js?v=11"></script>
<script src="js/engine/choice.js?v=12"></script>
<script src="js/engine/scene.js?v=12"></script>
<script src="js/main.js?v=10"></script>

</body>
</html>
